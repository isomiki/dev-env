services:
  dev-environment:
    image: ghcr.io/isomiki/dev-env:latest
    container_name: dev-env
    hostname: dev
    restart: unless-stopped
    privileged: true
    # Resource caps. mem_limit is the container's RAM ceiling; memswap_limit is
    # RAM+swap, so the gap (here 2g) is how much it may spill to *host* swap before
    # being OOM-killed. Allowing some swap avoids cgroup refault-thrash when the
    # container hits its RAM cap (requires swap to exist on the host). cpus leaves
    # headroom so the host stays responsive under load.
    mem_limit: ${MEM_LIMIT:-4g}
    memswap_limit: ${MEMSWAP_LIMIT:-6g}
    cpus: ${CPUS:-1.5}
    environment:
      - DEFAULT_SSH_PUBLIC_KEY=${DEFAULT_SSH_PUBLIC_KEY:-}
      - DOCKER_REGISTRY_TOKEN=${DOCKER_REGISTRY_TOKEN:-}
    volumes:
      - 'home:/root'
      - 'docker-data:/var/lib/docker'
    ports:
      - '${APP_PORT:-3000}:3000'
      - '${SSH_PORT:-2222}:22'
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/localhost/22' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
