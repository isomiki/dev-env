services:
  dev-environment:
    image: ghcr.io/isomiki/dev-env:latest
    container_name: dev-env
    hostname: dev
    restart: unless-stopped
    privileged: true
    # Resource caps so a runaway build can't starve the host. memswap_limit ==
    # mem_limit disables container swap (memory spikes are OOM-killed cleanly
    # rather than thrashing the host); cpus leaves headroom for the host.
    mem_limit: ${MEM_LIMIT:-4g}
    memswap_limit: ${MEMSWAP_LIMIT:-4g}
    cpus: ${CPUS:-1.5}
    environment:
      - DEFAULT_SSH_PUBLIC_KEY=${DEFAULT_SSH_PUBLIC_KEY}
      - DOCKER_REGISTRY_TOKEN=${DOCKER_REGISTRY_TOKEN}
    volumes:
      - 'home:/root'
      - 'docker-data:/var/lib/docker'
    ports:
      - '${APP_PORT:-3000}:3000'
      - '${SSH_PORT:?SSH_PORT is required}:22'
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/localhost/22' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
