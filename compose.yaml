services:
  dev-environment:
    image: ghcr.io/isomiki/dev-env:latest
    container_name: dev-env
    restart: unless-stopped
    privileged: true
    environment:
      - DEFAULT_SSH_PUBLIC_KEY=${DEFAULT_SSH_PUBLIC_KEY}
      - DOCKER_REGISTRY_TOKEN=${DOCKER_REGISTRY_TOKEN}
    volumes:
      - 'home:/root'
      - 'docker-data:/var/lib/docker'
    ports:
      - '3001:3000'
      - '60001:22'
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/localhost/22' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
